<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Matrix Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>LED Matrix Controller</h1>

    <section class="card">
      <!-- Message input box -->
      <textarea id="text" placeholder="Type your message here"></textarea>

      <div class="slider-row">
        <div class="speed-box">
          <label for="speed">scroll speed <span id="speedValue">33</span>%</label>
          <input id="speed" type="range" min="0" max="100" value="33">
        </div>
      </div>

      <!-- Buttons below the slider -->
      <div class="button-row">
        <button id="directionButton" class="direction-button" onclick="toggleDirection()">↻</button>
        <button class="send-button" onclick="sendText()">
          send <img src="send.png" alt="Send" class="button-icon">
        </button>
      </div>

      <div class="center-label">made by Javier</div>
    </section>

    <section class="card">
      <p class="small">When you click send, the selected speed is sent automatically with your text.</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
